# Beaver Bot Configuration

app:
  name: "Beaver Bot"
  version: "0.1.0"
  debug: false

model:
  provider: "openrouter"  # openrouter, anthropic, openai
  model: "anthropic/claude-3-haiku"
  api_key: "${OPENROUTER_API_KEY}"
  max_tokens: 4096
  temperature: 0.7

github:
  token: "${GITHUB_TOKEN}"
  owner: "user-YeLei"
  repo: "beaver-bot"

cli:
  prompt: "🦫 Beaver"
  welcome_banner: |
    ╔══════════════════════════════════════╗
    ║     🦫 Beaver Bot 开发助手          ║
    ║     输入 /help 查看帮助              ║
    ╚══════════════════════════════════════╝
  colors:
    user: "cyan"
    assistant: "green"
    error: "red"
    info: "blue"

logging:
  level: "INFO"
  format: "json"
